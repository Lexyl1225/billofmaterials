# =============================================================
# BOM Application - Location Block Configuration
# Add this to your EXISTING nginx server block for serverx.ratfish-regulus.ts.net
# =============================================================

# OPTION 1: If you want to ADD to existing server block
# Copy the location block below into your existing nginx config:
# /etc/nginx/sites-available/your-main-site

# BOM Application - Location Block
location /bom/ {
    alias /var/www/electrical/wordpress/bom/;
    index login.php index.php index.html;
    
    # Try files in order
    try_files $uri $uri/ /bom/login.php?$args;
    
    # PHP processing for BOM
    location ~ ^/bom/.*\.php$ {
        alias /var/www/electrical/wordpress/bom/;
        
        # Extract the script name from the URI
        if (!-f $request_filename) {
            rewrite ^/bom/(.*)$ /bom/login.php last;
        }
        
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.1-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $request_filename;
        fastcgi_index login.php;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }
    
    # Security: Block sensitive files in BOM
    location ~ ^/bom/(users\.json|user_activity_logs\.json|db-config\.php|activity_logger.*\.php|migrate.*\.php|.*\.sql|test_db\.php)$ {
        deny all;
        return 404;
    }
}

# =============================================================
# OPTION 2: Complete standalone server block (backup/reference)
# Use this if you want a separate configuration file
# =============================================================

server {
    listen 80;
    listen [::]:80;
    server_name serverx.ratfish-regulus.ts.net;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name serverx.ratfish-regulus.ts.net;
    
    # SSL Configuration (use your existing certificates)
    ssl_certificate /etc/letsencrypt/live/serverx.ratfish-regulus.ts.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/serverx.ratfish-regulus.ts.net/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    
    # Root for WordPress
    root /var/www/electrical/wordpress;
    index index.php index.html;
    
    # Logging
    access_log /var/log/nginx/serverx_access.log;
    error_log /var/log/nginx/serverx_error.log;
    
    # WordPress main site
    location / {
        try_files $uri $uri/ /index.php?$args;
    }
    
    # PHP processing for WordPress
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.1-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }
    
    # site2 location (existing)
    location /site2/ {
        alias /var/www/electrical/wordpress/site2/;
        try_files $uri $uri/ /site2/index.php?$args;
        
        location ~ ^/site2/.*\.php$ {
            include snippets/fastcgi-php.conf;
            fastcgi_pass unix:/var/run/php/php8.1-fpm.sock;
            fastcgi_param SCRIPT_FILENAME $request_filename;
            include fastcgi_params;
        }
    }
    
    # BOM application location (NEW)
    location /bom/ {
        alias /var/www/electrical/wordpress/bom/;
        index login.php index.php index.html;
        try_files $uri $uri/ /bom/login.php?$args;
        
        location ~ ^/bom/.*\.php$ {
            include snippets/fastcgi-php.conf;
            fastcgi_pass unix:/var/run/php/php8.1-fpm.sock;
            fastcgi_param SCRIPT_FILENAME $request_filename;
            include fastcgi_params;
            fastcgi_read_timeout 300;
        }
        
        # Security: Block sensitive files
        location ~ ^/bom/(users\.json|user_activity_logs\.json|db-config\.php|activity_logger.*\.php|migrate.*\.php|.*\.sql|test_db\.php)$ {
            deny all;
            return 404;
        }
    }
    
    # Block hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/xml;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Cache static assets
    location ~* \.(jpg|jpeg|gif|png|css|js|ico|xml|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
    
    client_max_body_size 10M;
}
